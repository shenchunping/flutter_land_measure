name: flutter_land_measure
description: GPS-based land area measurement app with Kalman filtering
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 地理位置
  geolocator: ^9.0.2
  location: ^5.0.1

  # 地图
  google_maps_flutter: ^2.5.0

  # 状态管理
  provider: ^6.0.0

  # 数据存储
  sqflite: ^2.3.0
  path: ^1.8.3

  # 工具库
  latlong2: ^0.9.1
  intl: ^0.19.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
